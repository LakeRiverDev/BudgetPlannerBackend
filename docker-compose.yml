services:
  postgres:
    container_name: budget-planner-db
    image: postgres:17
    restart: always
    environment:
      - POSTGRES_DB=bp_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - 5555:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
