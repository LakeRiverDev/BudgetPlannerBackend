services:
  backend-api:
    container_name: budget-planner-api
    build:
      context: .
      dockerfile: BP.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionString=Server=budget-planner-db;Port=5432;Database=bp_db;User Id=postgres;Password=postgres;
    ports:
      - 7013:8080
    volumes:
      - api-data:/var/lib/api
      
  postgres:
    container_name: budget-planner-db
    image: postgres:17
    restart: always
    environment:
      - POSTGRES_DB=bp_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - 5555:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
  api-data:
